name: 🔐 SecureVault — Pipeline DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Scan de sécurité hebdomadaire (chaque lundi à 8h UTC)
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — LINT (Qualité & sécurité du code)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint (backend)
        working-directory: backend
        run: npx eslint src/ --ext .js --max-warnings 0 || echo "::warning::ESLint warnings found"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint (frontend)
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 10 || echo "::warning::Frontend ESLint warnings"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — AUDIT DES DÉPENDANCES (Supply chain security)
  # ─────────────────────────────────────────────────────────────────────────
  audit:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend — CRITICAL vulnerabilities block build
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=critical
          echo "✅ No CRITICAL vulnerabilities in backend"

      - name: Audit backend — HIGH vulnerabilities (warning only)
        working-directory: backend
        run: |
          HIGH_COUNT=$(npm audit --audit-level=high --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "0")
          echo "HIGH vulnerabilities found: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt "5" ]; then
            echo "::warning::More than 5 HIGH vulnerabilities detected ($HIGH_COUNT). Please review."
          fi

      - name: Audit frontend — CRITICAL vulnerabilities block build
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=critical || echo "::warning::Frontend audit issues (react-scripts known issues)"

      - name: Generate audit report
        working-directory: backend
        run: |
          echo "## 📦 Dependency Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          m = d.get('metadata', {}).get('vulnerabilities', {})
          for k, v in m.items():
              if v > 0:
                  print(f'{k}: {v}')
          print('OK' if not any(m.values()) else 'Issues found')
          " 2>/dev/null || echo "Audit completed"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — SCAN DE SECRETS
  # ─────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: 🔑 Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          # Checkout full history for trufflehog
          # fetch-depth: 0

      - name: Scan for hardcoded secrets (grep patterns)
        run: |
          echo "Scanning for common secret patterns..."
          FOUND=0

          # Patterns à détecter
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]{4,}"
            "secret\s*=\s*['\"][^'\"]{8,}"
            "api_key\s*=\s*['\"][^'\"]{8,}"
            "private_key"
            "BEGIN RSA PRIVATE KEY"
            "BEGIN OPENSSH PRIVATE KEY"
            "AKIA[0-9A-Z]{16}"
          )

          for pattern in "${PATTERNS[@]}"; do
            RESULTS=$(grep -rn --include="*.js" --include="*.jsx" --include="*.ts" \
              --exclude-dir=node_modules --exclude-dir=.git \
              -iE "$pattern" . 2>/dev/null || true)
            if [ -n "$RESULTS" ]; then
              echo "⚠️ Potential secret found with pattern '$pattern':"
              echo "$RESULTS"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "❌ Potential secrets detected — please review and remove!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Check .gitignore covers sensitive files
        run: |
          REQUIRED_PATTERNS=(".env" "uploads/" "data/" "*.db" "node_modules/")
          MISSING=0
          for pattern in "${REQUIRED_PATTERNS[@]}"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "⚠️ Missing .gitignore pattern: $pattern"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "::warning::.gitignore is missing some sensitive file patterns"
          else
            echo "✅ .gitignore covers all sensitive patterns"
          fi

      - name: Verify no .env files committed
        run: |
          if git ls-files | grep -E "^\.env$|/\.env$"; then
            echo "❌ .env file is committed! Remove it immediately."
            exit 1
          else
            echo "✅ No .env files in repository"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — TESTS UNITAIRES
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          # Si jest est configuré, lancer les tests
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --coverage --coverageThreshold='{"global":{"lines":60}}' 2>/dev/null || \
            echo "::warning::Tests not fully configured yet — add Jest to package.json"
          else
            echo "::warning::No test script found in backend/package.json"
          fi

      - name: Security-focused test assertions
        working-directory: backend
        run: |
          echo "## 🧪 Security Test Assertions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Vérifier que rate limiting est configuré
          if grep -q "rateLimit\|rate-limit" src/server.js 2>/dev/null; then
            echo "| Rate limiting configured | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Rate limiting configured | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Vérifier que helmet est configuré
          if grep -q "helmet" src/server.js 2>/dev/null; then
            echo "| Security headers (Helmet) | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security headers (Helmet) | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Vérifier que CORS est configuré
          if grep -q "cors" src/server.js 2>/dev/null; then
            echo "| CORS configured | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| CORS configured | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Vérifier sanitisation des entrées
          if grep -q "sanitize\|replace.*spec" src/controllers/uploadController.js 2>/dev/null; then
            echo "| Input sanitization | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Input sanitization | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Vérifier UUID
          if grep -q "uuid\|uuidv4\|UUIDV4" src/models/File.js 2>/dev/null || grep -q "uuid" src/controllers/uploadController.js 2>/dev/null; then
            echo "| UUID v4 for file IDs | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| UUID v4 for file IDs | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — BUILD DOCKER
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [audit, secrets-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build ./backend -t securevault-backend:ci
          echo "✅ Backend image built successfully"

      - name: Build frontend image
        run: |
          docker build ./frontend -t securevault-frontend:ci
          echo "✅ Frontend image built successfully"

      - name: Check Docker image sizes
        run: |
          echo "## 🐳 Docker Image Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          BACKEND_SIZE=$(docker image inspect securevault-backend:ci --format='{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          FRONTEND_SIZE=$(docker image inspect securevault-frontend:ci --format='{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "| securevault-backend | $BACKEND_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| securevault-frontend | $FRONTEND_SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Start services and run integration check
        run: |
          # Créer les dossiers nécessaires
          mkdir -p data uploads/temp

          # Démarrer le backend
          docker run -d --name test-backend \
            -p 3001:3001 \
            -e NODE_ENV=test \
            -e SQLITE_PATH=/tmp/test.db \
            -e UPLOAD_DIR=/tmp/uploads \
            -e PORT=3001 \
            securevault-backend:ci

          # Attendre le démarrage
          echo "Waiting for backend to start..."
          sleep 10

          # Vérifier le health endpoint
          HEALTH=$(curl -sf http://localhost:3001/api/health 2>/dev/null || echo "FAILED")
          if echo "$HEALTH" | grep -q "ok"; then
            echo "✅ Backend health check passed"
            echo "| Backend health check | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend health check failed: $HEALTH"
            docker logs test-backend
            echo "| Backend health check | ❌ |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Vérifier les en-têtes de sécurité
          HEADERS=$(curl -sI http://localhost:3001/api/health 2>/dev/null)
          echo "$HEADERS"

          if echo "$HEADERS" | grep -qi "x-frame-options"; then
            echo "✅ X-Frame-Options header present"
          else
            echo "::warning::X-Frame-Options header missing"
          fi

          if echo "$HEADERS" | grep -qi "x-content-type-options"; then
            echo "✅ X-Content-Type-Options header present"
          else
            echo "::warning::X-Content-Type-Options header missing"
          fi

          docker stop test-backend && docker rm test-backend

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 6 — ANALYSE STATIQUE SÉCURITÉ (SAST)
  # ─────────────────────────────────────────────────────────────────────────
  sast:
    name: 🛡️ SAST Analysis
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ESLint security plugin
        working-directory: backend
        run: |
          npm ci
          npm install --save-dev eslint-plugin-security 2>/dev/null || true

      - name: Run security-focused ESLint rules
        working-directory: backend
        run: |
          # Créer config ESLint sécurité temporaire
          cat > /tmp/.eslintrc-security.json << 'EOF'
          {
            "env": { "node": true, "es2021": true },
            "extends": ["eslint:recommended"],
            "plugins": [],
            "rules": {
              "no-eval": "error",
              "no-implied-eval": "error",
              "no-new-func": "error",
              "no-script-url": "error",
              "no-proto": "error"
            }
          }
          EOF
          npx eslint src/ -c /tmp/.eslintrc-security.json --ext .js 2>/dev/null || \
          echo "::warning::Some security-focused lint warnings found"

      - name: Check for dangerous patterns manually
        working-directory: backend
        run: |
          echo "## 🛡️ SAST Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # eval usage
          if grep -rn "eval(" src/ --include="*.js" | grep -v "//"; then
            echo "| No eval() usage | ❌ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| No eval() usage | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          fi

          # SQL injection risk (raw queries)
          if grep -rn "query.*\`.*\${" src/ --include="*.js"; then
            echo "| No SQL injection risk (template literals in queries) | ⚠️ Review |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| No SQL injection risk | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          fi

          # Path traversal risk
          if grep -rn "req\.\(params\|query\|body\)" src/ --include="*.js" | grep "path\|join\|readFile"; then
            echo "| Path traversal check | ⚠️ Review |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Path traversal check | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          fi

          # Prototype pollution
          if grep -rn "__proto__\|constructor\[" src/ --include="*.js"; then
            echo "| No prototype pollution | ❌ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| No prototype pollution | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 7 — RAPPORT FINAL
  # ─────────────────────────────────────────────────────────────────────────
  security-report:
    name: 📊 Security Report
    runs-on: ubuntu-latest
    needs: [lint, audit, secrets-scan, test, docker-build, sast]
    if: always()
    steps:
      - name: Generate final security summary
        run: |
          echo "# 🔐 SecureVault — Rapport Sécurité DevSecOps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date :** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit :** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branche :** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Résultats des jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & Code Quality | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Audit | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secrets Detection | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ SAST Analysis | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Principes Shift-Left appliqués" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Scan de vulnérabilités dépendances (npm audit)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Détection de secrets hardcodés" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Analyse statique de sécurité (SAST)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tests d'intégration avec vérification des en-têtes HTTP" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Docker avec health check automatique" >> $GITHUB_STEP_SUMMARY
